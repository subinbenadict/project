<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ananda - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #4A6B53; --accent-color: #8AA891; --text-dark: #2C3E35; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(rgba(247, 250, 248, 0.4), rgba(247, 250, 248, 0.4)), url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .auth-container { background: rgba(255, 255, 255, 0.95); padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--primary-color); margin-bottom: 5px; }
        .form-group { display: flex; flex-direction: column; text-align: left; margin-bottom: 1rem; position: relative; }
        .form-group i { position: absolute; left: 15px; top: 38px; color: var(--accent-color); }
        label { font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--text-dark); }
        input { width: 100%; padding: 10px 10px 10px 40px; border: 1px solid var(--accent-color); border-radius: 8px; outline: none; }
        input:focus { border-color: var(--primary-color); }
        button { background: var(--primary-color); color: var(--white); padding: 12px; border: none; border-radius: 30px; width: 100%; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .link-text { margin-top: 15px; font-size: 0.9rem; }
        .link-text a { color: var(--primary-color); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2><i class="fa-solid fa-seedling"></i> Join Ananda</h2>
        <p style="margin-bottom: 20px; color: #607266; font-size: 0.9rem;">Create your account</p>
        
        <form action="/signup" method="POST">
            <div class="form-group">
                <label>Username</label>
                <i class="fa-solid fa-user"></i>
                <input type="text" name="username" required placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" required placeholder="email@domain.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <i class="fa-solid fa-phone"></i>
                <input type="text" name="phone" required placeholder="123-456-7890">
            </div>
            <div class="form-group">
                <label>Password</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <p class="link-text">Already have an account? <a href="/login">Log in here</a></p>
    </div>
</body>
</html>
